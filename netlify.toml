# Netlify config for John Spilotros Real Estate.
# This site has NO build step — it's plain HTML/CSS/JS served as-is.
# `publish = "."` assumes the repo's root contains index.html (see SETUP-GUIDE.md).

[build]
  publish = "."

# Security + caching headers (also mirrored in _headers for other hosts).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://identity.netlify.com 'sha256-s8l80WriM00pLBd7WLIny1578G/2rWP8EyuS2LYsb9g='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com data:; connect-src 'self' https://formspree.io; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"

# Keep the admin out of search results.
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Listings data should always be fetched fresh so new listings show immediately.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
