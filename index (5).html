<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOHN SPILOTROS</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#050507;--dark:#0d0d12;--surface:#111118;--border:#181820;--purple:#4a2d8a;--purple-l:#6b47b8;--white:#c8c8d4;--muted:#3d3d50}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Barlow',sans-serif;color:var(--white);cursor:none}
body::after{content:'';position:fixed;width:8px;height:8px;background:rgba(200,200,212,.7);pointer-events:none;z-index:9999;top:var(--cy,-20px);left:var(--cx,-20px);transform:translate(-50%,-50%);transition:width .18s,height .18s,background .18s}
body.ch::after{width:14px;height:14px;background:#6b47b8;opacity:.7}
*,a,button,input,textarea{cursor:none!important}
#c{position:fixed;inset:0;z-index:0}

#name-plate{position:fixed;top:7%;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none;transition:opacity .5s,transform .5s}
#name-plate h1{font-family:'Courier Prime',monospace;font-size:clamp(2rem,5vw,4rem);font-weight:700;color:#fff;letter-spacing:.05em;line-height:1.1;text-shadow:0 2px 32px rgba(0,0,0,.55)}
#name-plate .tag{font-size:.55rem;color:rgba(255,255,255,.38);letter-spacing:.2em;text-transform:uppercase;margin-top:8px}
#name-plate.hidden{opacity:0;transform:translateX(-50%) translateY(-16px)}

#hint{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);font-size:.53rem;color:rgba(255,255,255,.3);letter-spacing:.18em;text-transform:uppercase;animation:pulse 2.5s ease-in-out infinite;z-index:10;pointer-events:none}
@keyframes pulse{0%,100%{opacity:.1}50%{opacity:.45}}
#hint.hidden{opacity:0!important;pointer-events:none}

/* INTERIOR */
#interior{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s;z-index:30;background:radial-gradient(ellipse at 50% 60%,rgba(22,12,52,.97) 0%,rgba(5,5,7,1) 70%)}
#interior.open{opacity:1;pointer-events:all}
#close-btn{position:absolute;top:24px;right:32px;background:none;border:none;color:var(--muted);font-family:'Barlow',sans-serif;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;padding:8px;transition:color .2s}
#close-btn:hover{color:var(--white)}
.int-label{font-size:.5rem;color:var(--muted);letter-spacing:.24em;text-transform:uppercase;margin-bottom:44px}
.mail-items{display:flex;gap:28px;flex-wrap:wrap;align-items:center;justify-content:center}
.mail-card{background:rgba(255,255,255,.025);border:1px solid rgba(107,71,184,.18);padding:44px 56px;text-align:center;transition:background .2s,border-color .2s,transform .25s;animation:floatCard 3.4s ease-in-out infinite}
.mail-card:nth-child(2){animation-delay:1.7s}
.mail-card:hover{background:rgba(107,71,184,.07);border-color:rgba(107,71,184,.38);transform:translateY(-8px)!important}
@keyframes floatCard{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.mail-card h2{font-family:'Courier Prime',monospace;font-size:clamp(1.1rem,2.5vw,1.8rem);font-weight:700;color:var(--white);letter-spacing:.08em;margin-bottom:8px}
.mail-card:nth-child(2) h2{color:#a78bfa}
.mail-card p{font-size:.52rem;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}

/* INQUIRY */
#inquiry-page{position:fixed;inset:0;background:var(--black);z-index:40;display:flex;align-items:center;justify-content:center;padding:48px 24px;opacity:0;pointer-events:none;transition:opacity .3s;overflow-y:auto}
#inquiry-page.open{opacity:1;pointer-events:all}
.inquiry-inner{width:100%;max-width:420px}
.inquiry-back{background:none;border:none;color:var(--muted);font-family:'Barlow',sans-serif;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;padding:0;margin-bottom:28px;display:flex;align-items:center;gap:8px;transition:color .2s}
.inquiry-back:hover{color:var(--white)}
.inquiry-back::before{content:'←'}
.inquiry-inner h2{font-family:'Courier Prime',monospace;font-size:clamp(1.3rem,3vw,2rem);font-weight:700;color:var(--white);margin-bottom:6px}
.sub{font-size:.54rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:28px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.52rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;transition:color .2s}
.form-group:focus-within .form-label{color:var(--purple-l)}
.form-input{width:100%;background:var(--dark);border:1px solid var(--border);color:var(--white);font-family:'Barlow',sans-serif;font-weight:600;font-size:.74rem;letter-spacing:.06em;padding:11px 15px;border-radius:0;outline:none;transition:border-color .2s,background .2s}
.form-input::placeholder{color:var(--muted);opacity:.4}
.form-input:focus{border-color:var(--purple-l);background:var(--surface)}
.form-input.err{border-color:rgba(107,71,184,.7);animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.submit-btn{width:100%;background:var(--purple);color:rgba(255,255,255,.85);border:1px solid var(--purple);font-family:'Barlow',sans-serif;font-weight:600;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;padding:13px;margin-top:6px;transition:background .2s,opacity .2s}
.submit-btn:hover{background:var(--purple-l);border-color:var(--purple-l)}
.submit-btn:active{opacity:.7}
.form-success{display:none;margin-top:10px;font-size:.56rem;color:var(--purple-l);letter-spacing:.12em;text-transform:uppercase}

footer{position:fixed;bottom:0;left:0;right:0;padding:14px 36px;display:flex;justify-content:space-between;align-items:center;font-size:.56rem;color:rgba(255,255,255,.2);letter-spacing:.14em;text-transform:uppercase;z-index:10;background:rgba(5,5,7,.3);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.04)}
footer span:first-child{font-weight:700;color:rgba(255,255,255,.45);font-family:'Courier Prime',monospace}
@media(max-width:600px){.mail-items{flex-direction:column;gap:14px}.mail-card{padding:26px 32px}footer{flex-direction:column;gap:4px;text-align:center;padding:10px}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="name-plate">
  <h1>JOHN<br>SPILOTROS</h1>
  <p class="tag">Click the mailbox to enter &nbsp;·&nbsp; Flag to contact</p>
</div>
<p id="hint">▾ move mouse to look around</p>

<!-- INTERIOR -->
<div id="interior">
  <button id="close-btn">← Back outside</button>
  <p class="int-label">You've got mail</p>
  <div class="mail-items">
    <div class="mail-card" onclick="openInquiry('PRICING')"><h2>PRICING</h2><p>Tap to inquire</p></div>
    <div class="mail-card" onclick="openInquiry('AVAILABILITY')"><h2>AVAILABILITY</h2><p>Tap to inquire</p></div>
  </div>
</div>

<!-- INQUIRY -->
<div id="inquiry-page">
  <div class="inquiry-inner">
    <button class="inquiry-back" onclick="closeInquiry()">Back</button>
    <h2>GET IN TOUCH</h2>
    <p class="sub" id="inquiry-sub">INQUIRY</p>
    <div class="form-group"><label class="form-label">Your Name</label><input type="text" class="form-input" id="f-name" placeholder="Full name"/></div>
    <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-input" id="f-phone" placeholder="+1 (000) 000-0000"/></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="f-email" placeholder="your@email.com"/></div>
    <div class="form-group"><label class="form-label">Service Provided</label><input type="text" class="form-input" id="f-service" placeholder="Describe the service"/></div>
    <button class="submit-btn" id="submit-btn">Send</button>
    <p class="form-success" id="form-success">Message sent. I'll be in touch soon.</p>
  </div>
</div>

<footer><span>John Spilotros</span><span>© 2025. All rights reserved.</span></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// cursor
document.addEventListener('mousemove',e=>{
  document.documentElement.style.setProperty('--cx',e.clientX+'px');
  document.documentElement.style.setProperty('--cy',e.clientY+'px');
});

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fd4f0);
scene.fog = new THREE.Fog(0xb8e4f8, 18, 40);

const cam = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
cam.position.set(0, 1.5, 5);
cam.lookAt(0, 1.4, 0);

scene.add(new THREE.AmbientLight(0xc8dff5, 0.6));
const sun = new THREE.DirectionalLight(0xfff5e0, 2.0);
sun.position.set(6, 12, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;   sun.shadow.camera.bottom = -8;
sun.shadow.camera.far = 60;
sun.shadow.bias = -0.001; sun.shadow.radius = 2;
scene.add(sun);
const skyFill = new THREE.DirectionalLight(0xa0c8ff, 0.4);
skyFill.position.set(-4,5,-2); scene.add(skyFill);
const groundBounce = new THREE.DirectionalLight(0xffeebb, 0.15);
groundBounce.position.set(0,-1,2); scene.add(groundBounce);

// materials
const BLUE        = new THREE.MeshPhongMaterial({color:0x1a4aa0,specular:0x4488dd,shininess:60});
const BLUE_DARK   = new THREE.MeshPhongMaterial({color:0x0f3070,specular:0x224488,shininess:40});
const SEAM_MAT    = new THREE.MeshPhongMaterial({color:0x0a2050,specular:0x112233,shininess:80});
const POST_MAT    = new THREE.MeshPhongMaterial({color:0x3a3428,specular:0x665544,shininess:20});
const RED_MAT     = new THREE.MeshPhongMaterial({color:0xcc1a0f,specular:0xff6644,shininess:50});
const RED_DARK    = new THREE.MeshPhongMaterial({color:0x991208,specular:0x442211,shininess:30});
const GRASS_MAT   = new THREE.MeshLambertMaterial({color:0x5a8c2e});
const CONCRETE_MAT= new THREE.MeshPhongMaterial({color:0xb0a898,specular:0x222222,shininess:5});
const picketMat   = new THREE.MeshPhongMaterial({color:0xf5f5f2,specular:0x333333,shininess:15});
const houseMat    = new THREE.MeshPhongMaterial({color:0xc0281a,specular:0x441108,shininess:18});
const roofMat2    = new THREE.MeshPhongMaterial({color:0x2a2a2a,specular:0x111111,shininess:10});
const trimMat     = new THREE.MeshPhongMaterial({color:0xf0ece4,specular:0x222222,shininess:15});
const glassMat    = new THREE.MeshPhongMaterial({color:0x88b8d8,specular:0x88ccff,shininess:120,transparent:true,opacity:0.85});
const doorMat2    = new THREE.MeshPhongMaterial({color:0x1a1a1a,specular:0x333333,shininess:40});
const roadMat     = new THREE.MeshPhongMaterial({color:0x5a5f68,specular:0x111111,shininess:8});
const kerbMat     = new THREE.MeshPhongMaterial({color:0xc0b8a8,specular:0x111111,shininess:5});
const swMat       = new THREE.MeshPhongMaterial({color:0xb8b0a0,specular:0x111111,shininess:4});

// ground
const gnd = new THREE.Mesh(new THREE.PlaneGeometry(80,80),GRASS_MAT);
gnd.rotation.x=-Math.PI/2; gnd.receiveShadow=true; scene.add(gnd);

// mailbox dims
const W=0.6, SH=0.55, R=W/2, DEPTH=1.5, MB_Y=1.4;

// concrete pad
const pad = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.2,0.06,12),CONCRETE_MAT);
pad.position.set(-R,0.03,0); pad.receiveShadow=true; scene.add(pad);

// mailbox shape
const shape = new THREE.Shape();
shape.moveTo(-R,0); shape.lineTo(-R,SH);
shape.absarc(0,SH,R,Math.PI,0,true);
shape.lineTo(R,0); shape.lineTo(-R,0);

const geo = new THREE.ExtrudeGeometry(shape,{depth:DEPTH,bevelEnabled:false});
const mailbox = new THREE.Mesh(geo,BLUE);
mailbox.position.set(-R,MB_Y,-DEPTH/2);
mailbox.castShadow=true; mailbox.receiveShadow=true; scene.add(mailbox);

const backCap = new THREE.Mesh(new THREE.ShapeGeometry(shape),BLUE_DARK);
backCap.position.set(-R,MB_Y,-DEPTH/2); scene.add(backCap);
const frontCap = new THREE.Mesh(new THREE.ShapeGeometry(shape),BLUE_DARK);
frontCap.rotation.y=Math.PI; frontCap.position.set(R,MB_Y,DEPTH/2); scene.add(frontCap);

// buttons
function makeButton(label,yOffset){
  const bc=document.createElement('canvas');
  bc.width=512; bc.height=120;
  const bx=bc.getContext('2d');
  bx.fillStyle='#0a1e50';
  bx.roundRect(8,8,496,104,14); bx.fill();
  bx.strokeStyle='#4488cc'; bx.lineWidth=4;
  bx.roundRect(8,8,496,104,14); bx.stroke();
  bx.fillStyle='#ffffff';
  bx.font='bold 52px Arial,sans-serif';
  bx.textAlign='center'; bx.textBaseline='middle';
  bx.fillText(label,256,60);
  const tex=new THREE.CanvasTexture(bc);
  const mat=new THREE.MeshPhongMaterial({map:tex,transparent:true,specular:0x224488,shininess:60});
  const btn=new THREE.Mesh(new THREE.PlaneGeometry(0.52,0.16),mat);
  btn.position.set(-0.32,MB_Y+yOffset,DEPTH/2+0.02);
  scene.add(btn); return btn;
}
const btnInquire=makeButton('INQUIRE',SH*0.62);
const btnPricing=makeButton('PRICING',SH*0.28);

// seam + strips
const seam=new THREE.Mesh(new THREE.BoxGeometry(W,0.022,DEPTH),SEAM_MAT);
seam.position.set(-R,MB_Y+SH,0); seam.castShadow=true; scene.add(seam);
const botStrip=new THREE.Mesh(new THREE.BoxGeometry(W+0.01,0.03,DEPTH+0.01),BLUE_DARK);
botStrip.position.set(-R,MB_Y-0.015,0); scene.add(botStrip);

// post
const POST_H=MB_Y-0.06;
const postMesh=new THREE.Mesh(new THREE.CylinderGeometry(0.038,0.052,POST_H,16),POST_MAT);
postMesh.position.set(-R,MB_Y-POST_H/2-0.03,0);
postMesh.castShadow=true; postMesh.receiveShadow=true; scene.add(postMesh);
const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,0.06,16),BLUE_DARK);
collar.position.set(-R,MB_Y-0.03,0); scene.add(collar);

// flag
const flagPivot=new THREE.Group();
flagPivot.position.set(R-0.28,MB_Y+SH*0.65,0.45);
scene.add(flagPivot);
const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.58,10),RED_DARK);
arm.position.y=0.29; arm.castShadow=true; flagPivot.add(arm);
const hinge=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.06,12),RED_DARK);
hinge.rotation.z=Math.PI/2; flagPivot.add(hinge);
const flagCanvas=document.createElement('canvas');
flagCanvas.width=256; flagCanvas.height=128;
const fctx=flagCanvas.getContext('2d');
fctx.fillStyle='#cc1a0f'; fctx.fillRect(0,0,256,128);
fctx.fillStyle='#ffffff'; fctx.font='bold 32px "Courier New",monospace';
fctx.textAlign='center'; fctx.textBaseline='middle';
fctx.fillText('CONTACT',128,64);
const flagTex=new THREE.CanvasTexture(flagCanvas);
const flagPanel=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.18,0.035),
  [RED_MAT,RED_MAT,RED_MAT,RED_MAT,new THREE.MeshPhongMaterial({map:flagTex,specular:0x331100,shininess:30}),RED_MAT]);
flagPanel.position.set(0.14,0.6,0); flagPanel.castShadow=true; flagPivot.add(flagPanel);
const flagSheen=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.055,0.02),
  new THREE.MeshPhongMaterial({color:0xff5544,transparent:true,opacity:0.35,shininess:100}));
flagSheen.position.set(0.14,0.65,0.02); flagPivot.add(flagSheen);

// road
const road=new THREE.Mesh(new THREE.PlaneGeometry(80,10),roadMat);
road.rotation.x=-Math.PI/2; road.position.set(0,0.001,9); road.receiveShadow=true; scene.add(road);
const dashMat=new THREE.MeshLambertMaterial({color:0xddd8c0});
for(let i=-14;i<=14;i++){
  const dash=new THREE.Mesh(new THREE.PlaneGeometry(1.8,0.15),dashMat);
  dash.rotation.x=-Math.PI/2; dash.position.set(i*4,0.003,9); scene.add(dash);
}
const kerb=new THREE.Mesh(new THREE.BoxGeometry(80,0.12,0.28),kerbMat);
kerb.position.set(0,0.06,4.1); kerb.castShadow=true; kerb.receiveShadow=true; scene.add(kerb);
const sidewalk=new THREE.Mesh(new THREE.PlaneGeometry(80,3.5),swMat);
sidewalk.rotation.x=-Math.PI/2; sidewalk.position.set(0,0.002,2.2); sidewalk.receiveShadow=true; scene.add(sidewalk);

// picket fence
const FZ=-1.2;
function makeFence(x0,x1){
  const len=x1-x0;
  [0.55,1.1].forEach(ry=>{
    const rail=new THREE.Mesh(new THREE.BoxGeometry(len,0.08,0.08),picketMat);
    rail.position.set((x0+x1)/2,ry,FZ); rail.castShadow=true; scene.add(rail);
  });
  for(let x=x0+0.18;x<x1;x+=0.36){
    const pk=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.3,0.08),picketMat);
    pk.position.set(x,0.65,FZ); pk.castShadow=true; scene.add(pk);
    const tip=new THREE.Mesh(new THREE.ConeGeometry(0.075,0.22,4),picketMat);
    tip.position.set(x,1.36,FZ); tip.rotation.y=Math.PI/4; scene.add(tip);
  }
}
makeFence(-14,-0.6); makeFence(0.6,14);
[-14,-0.6,0.6,14].forEach(x=>{
  const fp=new THREE.Mesh(new THREE.BoxGeometry(0.18,1.5,0.18),picketMat);
  fp.position.set(x,0.75,FZ); fp.castShadow=true; scene.add(fp);
  const fc=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.18,0.22),picketMat);
  fc.position.set(x,1.59,FZ); scene.add(fc);
});

// house
const HZ=-14;
const walls=new THREE.Mesh(new THREE.BoxGeometry(12,7,8),houseMat);
walls.position.set(0,3.5,HZ); walls.castShadow=true; walls.receiveShadow=true; scene.add(walls);
const roofL=new THREE.Mesh(new THREE.BoxGeometry(7.2,0.18,8.4),roofMat2);
roofL.position.set(-2.6,7.4,HZ); roofL.rotation.z=0.48; roofL.castShadow=true; scene.add(roofL);
const roofR=new THREE.Mesh(new THREE.BoxGeometry(7.2,0.18,8.4),roofMat2);
roofR.position.set(2.6,7.4,HZ); roofR.rotation.z=-0.48; roofR.castShadow=true; scene.add(roofR);
const ridge=new THREE.Mesh(new THREE.BoxGeometry(0.25,0.25,8.4),roofMat2);
ridge.position.set(0,9.6,HZ); scene.add(ridge);
const overhang=new THREE.Mesh(new THREE.BoxGeometry(12.4,0.18,1.2),roofMat2);
overhang.position.set(0,6.8,HZ+4.6); overhang.castShadow=true; scene.add(overhang);
const trimTop=new THREE.Mesh(new THREE.BoxGeometry(12.1,0.22,8.1),trimMat);
trimTop.position.set(0,7.1,HZ); scene.add(trimTop);
const trimBot=new THREE.Mesh(new THREE.BoxGeometry(12.1,0.22,8.1),trimMat);
trimBot.position.set(0,0.11,HZ); trimBot.receiveShadow=true; scene.add(trimBot);
function houseWin(x,y,wz){
  const fw=new THREE.Mesh(new THREE.BoxGeometry(2.5,2.1,0.12),doorMat2);
  fw.position.set(x,y,wz); scene.add(fw);
  const wg=new THREE.Mesh(new THREE.BoxGeometry(2.2,1.8,0.15),glassMat);
  wg.position.set(x,y,wz+0.02); scene.add(wg);
}
houseWin(-3.8,4.2,HZ+4.05); houseWin(3.8,4.2,HZ+4.05);
const doorH=new THREE.Mesh(new THREE.BoxGeometry(1.8,3.2,0.15),doorMat2);
doorH.position.set(0,1.6,HZ+4.05); doorH.castShadow=true; scene.add(doorH);
const doorFrame=new THREE.Mesh(new THREE.BoxGeometry(2.1,3.5,0.12),trimMat);
doorFrame.position.set(0,1.75,HZ+3.98); scene.add(doorFrame);
const doorGlass=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.8,0.12),glassMat);
doorGlass.position.set(0,2.8,HZ+4.08); scene.add(doorGlass);
const step1=new THREE.Mesh(new THREE.BoxGeometry(2.6,0.18,1.0),trimMat);
step1.position.set(0,0.09,HZ+4.6); step1.receiveShadow=true; scene.add(step1);
const step2=new THREE.Mesh(new THREE.BoxGeometry(3.0,0.18,1.5),trimMat);
step2.position.set(0,0.09,HZ+5.1); step2.receiveShadow=true; scene.add(step2);
const chim=new THREE.Mesh(new THREE.BoxGeometry(1.0,3.5,1.0),new THREE.MeshPhongMaterial({color:0x888078}));
chim.position.set(3.5,8.5,HZ); chim.castShadow=true; scene.add(chim);

// raycaster
const ray=new THREE.Raycaster();
const m2=new THREE.Vector2();
let flagUp=false, flagAngle=0;

const fHit=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.7,0.3),new THREE.MeshBasicMaterial({visible:false}));
fHit.position.set(0.1,0.35,0); flagPivot.add(fHit);
const mbHit=new THREE.Mesh(new THREE.BoxGeometry(W+0.1,SH+R+0.1,DEPTH+0.1),new THREE.MeshBasicMaterial({visible:false}));
mbHit.position.set(-R,MB_Y+(SH+R)/2,0); scene.add(mbHit);

function castRay(e){
  const rect=canvas.getBoundingClientRect();
  m2.x=((e.clientX-rect.left)/rect.width)*2-1;
  m2.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(m2,cam);
}

canvas.addEventListener('click',e=>{
  castRay(e);
  if(ray.intersectObject(fHit).length>0){openInquiry('CONTACT'); return;}
  if(ray.intersectObject(mbHit).length>0){openInterior(); return;}
  if(ray.intersectObject(btnInquire).length>0){openInquiry('INQUIRE'); return;}
  if(ray.intersectObject(btnPricing).length>0){openInquiry('PRICING'); return;}
});

canvas.addEventListener('mousemove',e=>{
  castRay(e);
  const onMb=ray.intersectObject(mbHit).length>0;
  const onF=ray.intersectObject(fHit).length>0;
  const onBI=ray.intersectObject(btnInquire).length>0;
  const onBP=ray.intersectObject(btnPricing).length>0;
  BLUE.color.setHex(onMb?0x2258b8:0x1a4aa0);
  document.body.classList.toggle('ch',onMb||onF||onBI||onBP);
});

// UI functions
function openInterior(){
  document.getElementById('interior').classList.add('open');
  document.getElementById('name-plate').classList.add('hidden');
  document.getElementById('hint').classList.add('hidden');
}
document.getElementById('close-btn').onclick=()=>{
  document.getElementById('interior').classList.remove('open');
  document.getElementById('name-plate').classList.remove('hidden');
  document.getElementById('hint').classList.remove('hidden');
};
function openInquiry(type){
  document.getElementById('inquiry-sub').textContent=type+' INQUIRY';
  document.getElementById('inquiry-page').classList.add('open');
}
function closeInquiry(){document.getElementById('inquiry-page').classList.remove('open');}

document.getElementById('submit-btn').onclick=()=>{
  const ids=['f-name','f-phone','f-email','f-service'];
  let ok=true;
  ids.forEach(id=>{const el=document.getElementById(id);el.classList.remove('err');if(!el.value.trim()){void el.offsetWidth;el.classList.add('err');ok=false;}});
  if(!ok)return;
  const btn=document.getElementById('submit-btn');
  let d=0;btn.disabled=true;btn.style.opacity='.6';
  const iv=setInterval(()=>{d=(d+1)%4;btn.textContent='Sending'+'.'.repeat(d);},300);
  setTimeout(()=>{
    clearInterval(iv);btn.textContent='Sent ✓';
    ids.forEach(id=>document.getElementById(id).value='');
    const s=document.getElementById('form-success');s.style.display='block';
    setTimeout(()=>{s.style.display='none';btn.textContent='Send';btn.disabled=false;btn.style.opacity='';closeInquiry();},2800);
  },1400);
};

// camera + loop
let mx=0,my=0,camX=0,camY=0;
document.addEventListener('mousemove',e=>{
  mx=(e.clientX/innerWidth-.5)*2;
  my=(e.clientY/innerHeight-.5)*2;
});

(function loop(){
  requestAnimationFrame(loop);
  camX+=(mx*2.5-camX)*.06;
  camY+=(-my*1.2-camY)*.06;
  cam.position.set(camX,1.5+camY,5);
  cam.lookAt(-R,MB_Y+SH*.5,0);
  flagAngle+=(( flagUp?Math.PI/2:0)-flagAngle)*.1;
  flagPivot.rotation.x=flagAngle;
  renderer.render(scene,cam);
})();

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
});
</script>
